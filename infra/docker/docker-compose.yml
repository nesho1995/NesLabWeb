services:
  mysql:
    image: mysql:8.4
    container_name: neslab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: neslab
      MYSQL_USER: neslab
      MYSQL_PASSWORD: neslab
    ports:
      - "3306:3306"
    volumes:
      - neslab_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./mysql/conf.d:/etc/mysql/conf.d
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]

volumes:
  neslab_mysql_data:
